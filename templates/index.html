<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fake News Detector</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Local Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Truth<span>Lens</span></h1>
            <p>Detect Misinformation. Verify Facts. Build Trust.</p>
            <div class="stats-banner">
                <div class="stat-item"><strong>10,000+</strong> Articles Analyzed</div>
                <div class="stat-item"><strong>94%</strong> Accuracy</div>
                <div class="stat-item"><strong>500+</strong> Sources Checked</div>
            </div>
        </header>

        <main>
            <div class="glass-panel input-section">
                <textarea id="news-text" placeholder="Paste an article, claim, or social media post here to analyze..."></textarea>
                
                <div class="example-inputs">
                    <span>Try:</span>
                    <button class="example-btn">"Scientists discover cure for cancer..."</button>
                    <button class="example-btn">"Government announces new tax policy..."</button>
                    <button class="example-btn">"Celebrity endorses miracle weight loss pill..."</button>
                </div>
                <div class="toggle-wrapper" style="margin-top: 15px; margin-bottom: 25px; text-align: left;">
                    <label class="toggle-container">
                        <input type="checkbox" id="use-search" checked>
                        <span class="slider"></span>
                        <span class="label-text">Enable Live Web Fact-Checking</span>
                    </label>
                </div>

                <button id="analyze-btn" class="glow-on-hover">Analyze Content</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing with Gemini AI...</p>
            </div>

            <div id="error-message" class="hidden glass-panel error-panel">
                <p id="error-text"></p>
            </div>

            <div id="results" class="hidden glass-panel result-section" style="text-align: left; line-height: 1.6;">
                <h3 style="margin-top: 0;">Analysis Results</h3>
                <div class="analysis-card" style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; gap: 30px;">
                    <div class="confidence-circle">
                        <div class="progress-ring" id="score-ring">
                            <span id="res-score"></span>
                        </div>
                        <p style="font-size: 0.9rem; color: #a0a0a0;">Credibility</p>
                    </div>
                    <div>
                        <h4 style="margin: 0; color: #fff; font-size: 1.5rem;" id="class-container">🟢 <span id="res-class"></span></h4>
                    </div>
                </div>

                <div class="analysis-card" style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                    <h4 style="margin: 0 0 10px 0; color: #ffd600;">⚠️ Risk Indicators</h4>
                    <ul id="res-risks" style="margin: 0; padding-left: 20px;"></ul>
                </div>

                <div class="analysis-card" style="margin-bottom: 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                    <h4 style="margin: 0 0 10px 0; color: #4facfe;">🔍 Fact-Check Findings</h4>
                    <ul id="res-claims" style="margin: 0; padding-left: 20px;"></ul>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('news-text').value = btn.innerText.replace(/"/g, '');
            });
        });

        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const text = document.getElementById('news-text').value;
            const useSearch = document.getElementById('use-search').checked;

            if (!text.trim()) {
                showError('Please enter some text to analyze.');
                return;
            }

            // Hide results and error, show loading
            document.getElementById('results').classList.add('hidden');
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, use_search: useSearch })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong');
                }

                populateResults(data);
                
                // Hide loading, show results
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                showError(err.message);
            }
        });

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }

        function populateResults(data) {
            const score = data.credibility_score || 0;
            document.getElementById('res-score').innerText = score + '%';
            document.getElementById('res-class').innerText = data.classification || 'Unknown';
            
            // Set circle color based on classification text
            const cls = data.classification ? data.classification.toLowerCase() : "";
            const classContainer = document.getElementById('class-container');
            let ringColor = '#ffd600';
            let emoji = '🟡';
            
            if (cls.includes('fake') || cls.includes('suspicious')) {
                ringColor = '#ff4b4b'; // Red
                emoji = '🔴';
            } else if (cls.includes('real')) {
                ringColor = '#00e676'; // Green
                emoji = '🟢';
            }
            
            classContainer.innerHTML = `${emoji} <span id="res-class" style="color: ${ringColor};">${data.classification || 'Unknown'}</span>`;
            document.getElementById('score-ring').style.background = `conic-gradient(${ringColor} ${score}%, rgba(255,255,255,0.1) 0)`;

            const risks = document.getElementById('res-risks');
            risks.innerHTML = '';
            (data.risk_indicators || []).forEach(item => {
                const li = document.createElement('li');
                li.innerText = item;
                li.style.color = '#ddd';
                risks.appendChild(li);
            });
            if (!data.risk_indicators || data.risk_indicators.length === 0) {
                risks.innerHTML = '<li style="color:#aaa;">None detected.</li>';
            }

            const claims = document.getElementById('res-claims');
            claims.innerHTML = '';
            (data.fact_check_findings || []).forEach(item => {
                const li = document.createElement('li');
                li.innerText = item.claim + ": " + item.status;
                li.style.color = '#ddd';
                claims.appendChild(li);
            });
            if (!data.fact_check_findings || data.fact_check_findings.length === 0) {
                claims.innerHTML = '<li style="color:#aaa;">No specific claims found.</li>';
            }
        }
    </script>
</body>
</html>
